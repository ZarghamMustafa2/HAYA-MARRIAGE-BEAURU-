<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Registration | Haya Marriage Bureau</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-maroon: #4d0000;
            --accent-gold: #D4AF37;
            --cream-bg: #FFFDF5;
            --white: #ffffff;
            --text-dark: #1a0000;
            --success-green: #004d26;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream-bg);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        .auth-container {
            padding: 150px 20px 100px;
            background: linear-gradient(135deg, #4d0000 0%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .register-card {
            background: var(--white);
            border-radius: 30px;
            width: 100%;
            max-width: 800px;
            padding: 50px;
            position: relative;
            z-index: 2;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            border: 1px solid var(--accent-gold);
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--primary-maroon);
            margin: 0 0 10px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary-maroon);
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-gold);
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary-maroon);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid rgba(77, 0, 0, 0.1);
            background: #fafafa;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: white;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.1);
        }

        .submit-section {
            margin-top: 50px;
            text-align: center;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-maroon), #800000);
            color: var(--accent-gold);
            padding: 20px 60px;
            border-radius: 50px;
            border: 2px solid var(--accent-gold);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(77, 0, 0, 0.3);
        }

        .btn-submit:disabled {
            background: #ccc;
            border-color: #999;
            color: #666;
            cursor: not-allowed;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 77, 38, 0.98);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--accent-gold);
            padding: 20px;
        }

        .success-content {
            max-width: 600px;
            animation: slideInUp 0.6s ease;
        }

        .success-content i { font-size: 4rem; margin-bottom: 20px; }
        .success-content h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 15px; }
        .success-content p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .register-card { padding: 30px 20px; }
            .form-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <header class="luxury-header">
            <div class="container header-inner">
                <div class="header-center">
                    <a href="index.html" style="text-decoration: none;">
                        <span class="logo-text-script">Haya Marriage Bureau</span>
                    </a>
                </div>
            </div>
        </header>
    </div>

    <main class="auth-container">
        <div class="register-card">
            <div class="form-header">
                <p style="color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; font-size: 0.8rem;">Private Registration</p>
                <h1>Application Form</h1>
                <div style="width: 60px; height: 2px; background: var(--accent-gold); margin: 15px auto;"></div>
            </div>

            <form id="applicationForm" action="https://api.web3forms.com/submit" method="POST">
                <!-- Web3Forms Access Key -->
                <input type="hidden" name="access_key" value="44866946-a4c3-421f-8980-6060c410317e">
                <input type="hidden" name="subject" value="New Bureau Registration - Quick Form">
                <input type="hidden" name="from_name" value="Haya Marriage Bureau">
                
                <div class="section-title">Personal Details</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Candidate Full Name</label>
                        <input type="text" name="Candidate_Name" placeholder="Enter Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Father's Name</label>
                        <input type="text" name="Father_Name" placeholder="Enter Father's Name" required>
                    </div>
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" name="Age" min="18" max="75" placeholder="Enter Age" required>
                    </div>
                    <div class="input-group">
                        <label>Caste</label>
                        <input type="text" name="Caste" placeholder="Enter Caste" required>
                    </div>
                    <div class="input-group">
                        <label>Education</label>
                        <input type="text" name="Education" placeholder="Last Degree / Qualification" required>
                    </div>
                    <div class="input-group">
                        <label>Monthly Income</label>
                        <input type="text" name="Monthly_Income" placeholder="e.g. 100k+ / Private Job" required>
                    </div>
                    <div class="input-group">
                        <label>Contact Number (Calling)</label>
                        <input type="tel" name="Contact_Number_Calling" placeholder="Mobile Number" required>
                    </div>
                    <div class="input-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" name="WhatsApp_Number" placeholder="WhatsApp Number" required>
                    </div>
                </div>

                <div class="submit-section">
                    <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
                    <p style="margin-top: 20px; color: #777; font-size: 0.8rem;">
                        <i class="fas fa-lock"></i> Secured with 256-bit Confidentiality.
                    </p>
                </div>
            </form>
        </div>
    </main>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <i class="fas fa-check-circle"></i>
            <h2>Success!</h2>
            <p>Assalam-o-Alaikum, Your Application has been Submitted.<br>Our team will contact you soon.</p>
            <button class="btn-submit" onclick="window.location.href='index.html'" style="background: var(--accent-gold); color: var(--primary-maroon);">Back to Home</button>
        </div>
    </div>

    <script>
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const btn = document.getElementById('submitBtn');
            const overlay = document.getElementById('successOverlay');

            btn.disabled = true;
            btn.innerHTML = 'Submitting...';

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => data[key] = value);

            fetch(form.action, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.status === 200) {
                    form.reset();
                    overlay.style.display = 'flex';
                } else {
                    alert("Submission error. Please ensure your internet is connected or try again.");
                    btn.disabled = false;
                    btn.innerHTML = 'Submit Application';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Network error. Please try again.");
                btn.disabled = false;
                btn.innerHTML = 'Submit Application';
            });
        });
    </script>
</body>
</html>
