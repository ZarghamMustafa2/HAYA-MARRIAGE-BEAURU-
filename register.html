<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form | Haya Marriage Bureau</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-maroon: #4d0000;
            --accent-gold: #D4AF37;
            --cream-bg: #FFFDF5;
            --white: #ffffff;
            --text-dark: #1a0000;
            --gold-light: #f2d480;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream-bg);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        .auth-container {
            padding: 180px 20px 100px;
            background: linear-gradient(135deg, #4d0000 0%, #1a0000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/gold-dust.png');
            opacity: 0.1;
        }

        .register-card {
            background: var(--white);
            border-radius: 30px;
            width: 100%;
            max-width: 1000px;
            padding: 60px;
            position: relative;
            z-index: 2;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            border: 1px solid var(--accent-gold);
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary-maroon);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .form-header p {
            color: var(--accent-gold);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary-maroon);
            margin: 50px 0 30px;
            padding-left: 20px;
            border-left: 4px solid var(--accent-gold);
            display: block;
            background: linear-gradient(to right, rgba(212, 175, 55, 0.05), transparent);
            padding: 10px 20px;
            border-radius: 0 10px 10px 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary-maroon);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        .input-group input, .input-group select, .input-group textarea {
            padding: 16px 20px;
            border-radius: 12px;
            border: 1.5px solid rgba(77, 0, 0, 0.1);
            background: #fafafa;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: white;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .submit-section {
            margin-top: 80px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 50px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-maroon), #800000);
            color: var(--accent-gold);
            padding: 22px 80px;
            border-radius: 50px;
            border: 2px solid var(--accent-gold);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(77, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-submit:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(77, 0, 0, 0.4);
            background: var(--primary-maroon);
            color: #fff;
        }

        .btn-submit:disabled {
            background: #ccc;
            border-color: #999;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success Message Overlay */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 77, 38, 0.98); /* Premium Emerald Green */
            z-index: 10000;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--accent-gold);
            padding: 20px;
        }

        .success-content {
            max-width: 600px;
            animation: slideInUp 0.6s ease;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-content i {
            font-size: 5rem;
            margin-bottom: 30px;
        }

        .success-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .success-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .register-card { padding: 40px 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .form-header h1 { font-size: 2.5rem; }
            .auth-container { padding-top: 140px; }
        }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <header class="luxury-header">
            <div class="container header-inner">
                <div class="header-center">
                    <a href="index.html" style="text-decoration: none;">
                        <span class="logo-text-script">Haya Marriage Bureau</span>
                    </a>
                </div>
            </div>
        </header>
    </div>

    <main class="auth-container">
        <div class="register-card">
            <div class="form-header">
                <p>Private & Confidential</p>
                <h1>Registration Form</h1>
                <div style="width: 100px; height: 3px; background: var(--accent-gold); margin: 0 auto;"></div>
            </div>

            <form id="applicationForm" action="https://api.web3forms.com/submit" method="POST">
                <!-- Web3Forms Config -->
                <input type="hidden" name="access_key" value="44866946-a4c3-421f-8980-6060c410317e">
                <input type="hidden" name="subject" value="New Registration from Haya Marriage Bureau">
                <input type="hidden" name="from_name" value="Haya Marriage Bureau Application">
                
                <!-- Personal Details -->
                <div class="section-title">Personal Details</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Candidate Full Name</label>
                        <input type="text" name="Candidate_Name" placeholder="As per CNIC" required>
                    </div>
                    <div class="input-group">
                        <label>Father's Name</label>
                        <input type="text" name="Candidate_Father_Name" required>
                    </div>
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" name="Candidate_Age" min="18" max="75" required>
                    </div>
                    <div class="input-group">
                        <label>Height</label>
                        <input type="text" name="Candidate_Height" placeholder="e.g. 5' 6\" required>
                    </div>
                    <div class="input-group">
                        <label>Caste</label>
                        <input type="text" name="Candidate_Caste" required>
                    </div>
                    <div class="input-group">
                        <label>Sect</label>
                        <select name="Candidate_Sect" required>
                            <option value="" disabled selected>Select Sect</option>
                            <option value="Sunni">Sunni</option>
                            <option value="Shia">Shia</option>
                            <option value="Wahhabi">Wahhabi</option>
                            <option value="Barelvi">Barelvi</option>
                            <option value="Deobandi">Deobandi</option>
                            <option value="Ahl-e-Hadith">Ahl-e-Hadith</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Education</label>
                        <input type="text" name="Candidate_Education" placeholder="Last Degree / Qualification" required>
                    </div>
                    <div class="input-group">
                        <label>Profession</label>
                        <input type="text" name="Candidate_Profession" placeholder="e.g. Software Engineer / Doctor" required>
                    </div>
                    <div class="input-group">
                        <label>Monthly Income</label>
                        <input type="text" name="Candidate_Monthly_Income" placeholder="e.g. 150k+" required>
                    </div>
                    <div class="input-group">
                        <label>Marital Status</label>
                        <select name="Candidate_Marital_Status" required>
                            <option value="Single">Single</option>
                            <option value="Divorced">Divorced</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Khula">Khula</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Contact Number (Calling)</label>
                        <input type="tel" name="Candidate_Call_Number" placeholder="Contact number for calling" required>
                    </div>
                    <div class="input-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" name="Candidate_WhatsApp_Number" placeholder="WhatsApp number" required>
                    </div>
                </div>

                <!-- Family Details -->
                <div class="section-title">Family Background</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Father Status</label>
                        <select name="Family_Father_Status" required>
                            <option value="Alive">Alive</option>
                            <option value="Passed Away">Passed Away</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Mother Status</label>
                        <select name="Family_Mother_Status" required>
                            <option value="Alive">Alive</option>
                            <option value="Passed Away">Passed Away</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Brothers Count</label>
                        <input type="number" name="Family_Brothers_Count" min="0" required>
                    </div>
                    <div class="input-group">
                        <label>Sisters Count</label>
                        <input type="number" name="Family_Sisters_Count" min="0" required>
                    </div>
                    <div class="input-group full-width">
                        <label>House Type</label>
                        <select name="Family_House_Type" required>
                            <option value="Own (Independent)">Own (Independent)</option>
                            <option value="Own (Joint)">Own (Joint)</option>
                            <option value="Rented">Rented</option>
                            <option value="Government Provided">Government Provided</option>
                        </select>
                    </div>
                </div>

                <!-- Partner Preferences -->
                <div class="section-title">Partner Preferences</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Preferred Age Range</label>
                        <input type="text" name="Partner_Preferred_Age" placeholder="e.g. 22-26" required>
                    </div>
                    <div class="input-group">
                        <label>Preferred City</label>
                        <input type="text" name="Partner_Preferred_City" placeholder="e.g. Lahore / Any" required>
                    </div>
                    <div class="input-group">
                        <label>Preferred Caste</label>
                        <input type="text" name="Partner_Preferred_Caste" placeholder="e.g. Same / Any" required>
                    </div>
                    <div class="input-group">
                        <label>Preferred Education</label>
                        <input type="text" name="Partner_Preferred_Education" placeholder="e.g. Masters / Graduate" required>
                    </div>
                </div>

                <div class="submit-section">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        Submit Application <div class="loader" id="loader"></div>
                    </button>
                    <p style="margin-top: 25px; color: #777; font-size: 0.85rem;">
                        <i class="fas fa-lock"></i> All applications are handled with strict 100% confidentiality.
                    </p>
                </div>
            </form>
        </div>
    </main>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <i class="fas fa-check-circle"></i>
            <h2>Success!</h2>
            <p>Assalam-o-Alaikum, Your Application has been Submitted.<br>Our team will verify and contact you soon.</p>
            <button class="btn-submit" onclick="window.location.href='index.html'" style="background: var(--accent-gold); color: var(--primary-maroon);">Back to Home</button>
        </div>
    </div>

    <script>
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const overlay = document.getElementById('successOverlay');

            // UI Feedback
            btn.disabled = true;
            if (loader) loader.style.display = 'inline-block';
            btn.innerHTML = 'Submitting... <div class="loader" style="display:inline-block"></div>';

            // Manual FormData construction to ensure access_key is first
            const originalData = new FormData(form);
            const formData = new FormData();
            
            // 1. Force the key first
            formData.append('access_key', '44866946-a4c3-421f-8980-6060c410317e');

            // 2. Append all other fields
            for (let [name, value] of originalData.entries()) {
                if (name !== 'access_key') {
                    formData.append(name, value);
                }
            }

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(async (response) => {
                const result = await response.json();
                if (response.status === 200) {
                    form.reset();
                    overlay.style.display = 'flex';
                } else {
                    alert("Submission failed: " + (result.message || "Please check your information and try again."));
                    resetSubmitButton();
                }
            })
            .catch(error => {
                console.error('Network Error:', error);
                alert("Network failure. Please ensure you are connected to the internet and try again.");
                resetSubmitButton();
            });

            function resetSubmitButton() {
                btn.disabled = false;
                btn.innerHTML = 'Submit Application';
                if (loader) loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
